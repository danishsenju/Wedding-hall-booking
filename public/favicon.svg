<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#06141B"/>
  <rect width="64" height="64" rx="14" fill="url(#bg-grad)" opacity="0.4"/>
  <!-- Gold border ring -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="13" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" opacity="0.6"/>
  <!-- Stylised "L" -->
  <text
    x="12"
    y="48"
    font-family="Georgia, serif"
    font-size="44"
    font-weight="300"
    fill="url(#gold-grad)"
    letter-spacing="-1"
  >L</text>
  <defs>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8C97A"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#11212D"/>
    </linearGradient>
  </defs>
</svg>
